<!-- i18n boot — runs before Babel so the JSON fetch parallelizes with the Babel transform -->
<script>
  (function(){
    var p = new URLSearchParams(location.search);
    var stored = null; try { stored = localStorage.getItem('mr_lang'); } catch(e){}
    var lang = p.get('lang') || stored || (navigator.language||'').slice(0,2).toLowerCase();
    if (lang !== 'fr') lang = 'en';
    document.documentElement.lang = lang;
    var titles = { en: "Services — Michael Rurka", fr: "Services — Michael Rurka" };
    if (titles[lang]) document.title = titles[lang];
    window.__I18N_BOOT__ = {
      lang: lang,
      dictPromise: fetch('i18n/'+lang+'.json', { cache: 'no-cache' })
        .then(function(r){ return r.ok ? r.json() : null; })
        .catch(function(){ return null; })
    };
  })();
</script>
